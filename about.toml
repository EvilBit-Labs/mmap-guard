# Keep in sync with deny.toml [licenses] allow list
accepted = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

# Only include what ships to consumers
ignore-build-dependencies = true
ignore-dev-dependencies = true

# Use built-in workarounds for crates with known license ambiguities
workarounds = ["ring"]
