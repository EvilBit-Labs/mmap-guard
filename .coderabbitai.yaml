# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US
tone_instructions: "Safe mmap wrapper in idiomatic Rust. Single unsafe block encapsulating memmap2, comprehensive error handling, Result-based APIs. Safety over performance, library reusability, modern Rust patterns."
early_access: true
enable_free_tier: true
reviews:
    profile: assertive
    request_changes_workflow: true
    high_level_summary: true
    high_level_summary_placeholder: "@coderabbitai summary"
    high_level_summary_in_walkthrough: true
    auto_title_placeholder: "@coderabbitai"
    auto_title_instructions: "Generate PR/MR titles following Conventional Commits format: type(scope): description. Use types: feat, fix, docs, style, refactor, perf, test, build, ci, chore. Use scopes: mmap, io, lib, api, safety, testing. Keep descriptions concise and action-oriented, focusing on mmap-guard functionality."
    review_status: true
    commit_status: true
    fail_commit_status: false
    collapse_walkthrough: true
    changed_files_summary: true
    sequence_diagrams: true
    estimate_code_review_effort: true
    assess_linked_issues: true
    related_issues: true
    related_prs: true
    suggested_labels: true
    auto_apply_labels: true
    suggested_reviewers: true
    auto_assign_reviewers: false
    in_progress_fortune: true
    poem: true
    labeling_instructions:
        - label: "mmap"
          instructions: "Apply when changes involve memory mapping, FileData enum, or the unsafe block wrapping memmap2"
        - label: "io"
          instructions: "Apply when changes involve file I/O, stdin loading, or the load/load_stdin functions"
        - label: "safety"
          instructions: "Apply when changes affect the safety contract, unsafe block documentation, or pre-flight checks"
        - label: "testing"
          instructions: "Apply when changes involve test infrastructure, test coverage, or testing utilities"
        - label: "rust"
          instructions: "Apply when changes involve Rust language features, idioms, or modern Rust patterns"
    path_filters:
        [
            "src/**",
            ".github/**",
            "!.github/workflows/release.yml",
            "*.md",
            "*.toml",
            "*.yaml",
            "*.yml",
            "*.json",
            "*.sh",
            "justfile",
            "!target/**",
            "!node_modules/**",
        ]
    path_instructions:
        - path: "src/lib.rs"
          instructions: "Focus on public API design (FileData, map_file, load, load_stdin), the single unsafe block wrapping memmap2, and safety documentation. Ensure comprehensive rustdoc with examples. Verify the unsafe block has a SAFETY comment."
        - path: "src/**"
          instructions: "Ensure no additional unsafe blocks are introduced. All buffer access must use bounds checking. Prioritize memory safety and idiomatic Rust patterns."
        - path: "Cargo.toml"
          instructions: "Review dependency management and build configuration. The only runtime dependency should be memmap2. Ensure proper version constraints and dependency hygiene."
        - path: "justfile"
          instructions: "Review build automation and development workflow. Ensure comprehensive task coverage, cross-platform compatibility, and developer experience."
    abort_on_close: true
    disable_cache: false
    auto_review:
        enabled: true
        auto_incremental_review: true
        ignore_title_keywords: ["WIP", "draft", "do not merge"]
        labels: ["mmap-guard", "rust"]
        drafts: false
        base_branches: ["main"]
        ignore_usernames: []
    finishing_touches:
        docstrings:
            enabled: true
        unit_tests:
            enabled: true
    pre_merge_checks:
        docstrings:
            mode: warning
            threshold: 85
        title:
            mode: warning
            requirements: "Must follow Conventional Commits specification: type(scope): description. Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore. Breaking changes indicated with ! in header or BREAKING CHANGE: in footer."
        description:
            mode: warning
        issue_assessment:
            mode: warning
        custom_checks:
            - name: "unsafe-audit"
              instructions: "Verify no new unsafe blocks are introduced beyond the single memmap2::Mmap::map() call. All unsafe blocks must have #[deny(clippy::undocumented_unsafe_blocks)] enforced SAFETY comments."
            - name: "error-handling-check"
              instructions: "Verify proper error handling with Result types and no panics in library code. All public APIs should return Result<T, E>. No unwrap() or expect() in library code."
            - name: "test-coverage-check"
              instructions: "Verify adequate test coverage for new functionality, especially edge cases and error conditions (empty files, non-existent paths, stdin). Include tests with tempfile."
    tools:
        ast-grep:
            rule_dirs: []
            util_dirs: []
            essential_rules: true
            packages: []
        shellcheck:
            enabled: true
        ruff:
            enabled: false
        markdownlint:
            enabled: true
        github-checks:
            enabled: true
            timeout_ms: 120000
        languagetool:
            enabled: true
            enabled_rules: []
            disabled_rules: []
            enabled_categories: []
            disabled_categories: []
            enabled_only: false
            level: default
        biome:
            enabled: false
        hadolint:
            enabled: false
        swiftlint:
            enabled: false
        phpstan:
            enabled: false
            level: default
        phpmd:
            enabled: false
        phpcs:
            enabled: false
        golangci-lint:
            enabled: false
        yamllint:
            enabled: true
        gitleaks:
            enabled: true
        checkov:
            enabled: false
        detekt:
            enabled: false
        eslint:
            enabled: false
        flake8:
            enabled: false
        rubocop:
            enabled: false
        buf:
            enabled: false
        regal:
            enabled: false
        actionlint:
            enabled: true
        pmd:
            enabled: false
        cppcheck:
            enabled: false
        semgrep:
            enabled: true
        circleci:
            enabled: false
        clippy:
            enabled: true
        sqlfluff:
            enabled: false
        prismaLint:
            enabled: false
        pylint:
            enabled: false
        oxc:
            enabled: false
        shopifyThemeCheck:
            enabled: false
        luacheck:
            enabled: false
        brakeman:
            enabled: false
        dotenvLint:
            enabled: false
        htmlhint:
            enabled: false
        checkmake:
            enabled: false
        osvScanner:
            enabled: true
chat:
    art: false
    auto_reply: true
    integrations:
        jira:
            usage: auto
        linear:
            usage: auto
knowledge_base:
    opt_out: false
    web_search:
        enabled: true
    code_guidelines:
        enabled: true
        filePatterns: []
    learnings:
        scope: auto
    issues:
        scope: local
    jira:
        usage: auto
        project_keys: []
    linear:
        usage: auto
        team_keys: []
    pull_requests:
        scope: local
    mcp:
        usage: enabled
        disabled_servers: []
code_generation:
    docstrings:
        language: en-US
        path_instructions:
            - path: "src/lib.rs"
              instructions: "Generate comprehensive rustdoc for public API with usage examples, error conditions, and safety notes. Document the unsafe block with SAFETY comments explaining the memmap2 invariants."
            - path: "src/**/*.rs"
              instructions: "Document all public items with rustdoc. Include examples for common usage patterns. Note any safety considerations."
    unit_tests:
        path_instructions:
            - path: "src/lib.rs"
              instructions: "Generate tests for FileData, map_file, load, and load_stdin. Test edge cases: empty files, non-existent paths, large files. Use tempfile for integration tests."
            - path: "src/**/*.rs"
              instructions: "Test error handling paths, boundary conditions, and the Deref/AsRef implementations. Ensure no panics in any test scenario."
issue_enrichment:
    auto_enrich:
        enabled: true
    planning:
        enabled: false
    labeling:
        labeling_instructions:
            - label: "bug"
              instructions: "Apply when the issue reports incorrect behavior, panics, SIGBUS, or data corruption"
            - label: "enhancement"
              instructions: "Apply when the issue requests new functionality, API additions, or performance improvements"
            - label: "documentation"
              instructions: "Apply when the issue is about rustdoc, README, AGENTS.md, or other documentation"
            - label: "safety"
              instructions: "Apply when the issue involves the unsafe block, safety contract, SIGBUS/truncation, or memory-mapping invariants"
            - label: "question"
              instructions: "Apply when the issue asks about usage, API design, or integration with downstream crates"
        auto_apply_labels: true
