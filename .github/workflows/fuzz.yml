name: Fuzz

on:
    schedule:
        - cron: "0 6 * * 1" # Weekly, Monday 06:00 UTC
    pull_request:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: read

defaults:
    run:
        shell: bash

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    CARGO_TERM_COLOR: always
    # Duration (seconds) each fuzz target runs before moving on.
    FUZZ_SECONDS: "60"

jobs:
    fuzz:
        if: github.event_name != 'pull_request' || startsWith(github.head_ref, 'mergify/merge-queue/')
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                target: [fuzz_read_bounded, fuzz_map_file]
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Install nightly toolchain
              uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
              with:
                  toolchain: nightly

            - name: Install cargo-fuzz
              env:
                  RUSTUP_TOOLCHAIN: nightly
              run: cargo install cargo-fuzz --locked

            - name: Run fuzz target
              env:
                  TARGET: ${{ matrix.target }}
                  RUSTUP_TOOLCHAIN: nightly
              run: cargo fuzz run "$TARGET" -- -max_total_time="$FUZZ_SECONDS"

            - name: Upload crash artifacts
              if: failure()
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
              with:
                  name: fuzz-crashes-${{ matrix.target }}
                  path: fuzz/artifacts/${{ matrix.target }}/
                  retention-days: 30
